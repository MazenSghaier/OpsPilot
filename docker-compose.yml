services:

  # ── Local LLM (Ollama) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: opspilot_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # On Windows Docker Desktop, GPU passthrough requires WSL2 + CUDA toolkit.
    # Remove the 'deploy' block below if you don't have an Nvidia GPU.
    # CPU inference on llama3.2 is slow but works (~10-20s per explanation).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Redis Streams (message queue) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opspilot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: opspilot_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: opspilot_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # ── Main API (FastAPI) ─────────────────────────────────────────────────────
  api:
    build:
      context: ./services
      dockerfile: api/Dockerfile
    container_name: opspilot_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./services/api:/app
      - ./services/anomaly_detector:/app/anomaly_detector 
      - ./services/llm_explainer:/app/llm_explainer
      - ./services/predictor:/app/predictor       
      - model_cache:/app/models
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Ingestion worker ───────────────────────────────────────────────────────
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: opspilot_ingestion
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:8000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  redis_data:
  prometheus_data:
  grafana_data:
  model_cache: